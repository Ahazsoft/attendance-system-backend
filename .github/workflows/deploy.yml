name: Deploy to cPanel via FTP/FTPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'

      # - name: Install dependencies
      #   run: pnpm install --frozen-lockfile

      # - name: Run build (if you have a build step, e.g., frontend bundling)
      #   run: pnpm run build || true   # skip if no build script

      - name: Deploy via FTP/FTPS to cPanel
        uses: SamKirkland/FTP-Deploy-Action@4.3.0
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT }}           # default 21
          protocol: ftps                          # or 'ftp'
          local-dir: ./                           # upload everything from repo root
          server-dir: ${{ secrets.FTP_REMOTE_DIR }} # e.g. /public_html
          exclude: |
            .git*
            node_modules
            .env
            .pnpm-store
            .github
